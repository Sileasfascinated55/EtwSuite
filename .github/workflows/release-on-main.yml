name: Release on Main

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      SOLUTION_FILE: EtwSuite.sln
      PACKAGE_PROJECT: EtwSuite\EtwSuite (Package)\EtwSuite (Package).wapproj
      TEST_PROJECT: EtwSuite.Tests\EtwSuite.Tests.csproj
      BUILD_CONFIGURATION: Release
      BUILD_PLATFORM: x64
      APP_PACKAGE_DIR: ${{ github.workspace }}\artifacts\app-package\
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Restore dependencies
        run: msbuild $env:SOLUTION_FILE /t:Restore /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM
      
      - name: Build
        run: msbuild $env:PACKAGE_PROJECT /m /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM /p:GenerateAppxPackageOnBuild=true /p:AppxBundle=Never /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxPackageDir=$env:APP_PACKAGE_DIR
      
      - name: Run Tests
        run: dotnet test $env:TEST_PROJECT --configuration $env:BUILD_CONFIGURATION --no-restore --verbosity normal /p:Platform=$env:BUILD_PLATFORM
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: artifacts/app-package/**
